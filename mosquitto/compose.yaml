---
services:
    mosquitto:
        image: eclipse-mosquitto:latest@sha256:a908c65cc8e67ec9d292ef27c2c0360dbaaee7eb1b935cdd194e67697f15dea1
        restart: unless-stopped
        environment:
            - TZ=Asia/Jerusalem
        volumes:
            - /opt/mosquitto/config:/mosquitto/config
        ports:
            - 1883:1883
            - 9001:9001
        healthcheck:
            test: mosquitto_sub -E -t '#'
            interval: 60s
            timeout: 5s
            retries: 2
