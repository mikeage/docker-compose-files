---
services:
    qbittorrent:
        image: lscr.io/linuxserver/qbittorrent:latest
        healthcheck:
            test: [CMD-SHELL, "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/$${WEBUI_PORT}; printf \"GET / HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\\
                      r\\n\\r\\n\" >&3; grep -Eq \"HTTP/1\\\\.[01] (200|301|302)\" <&3'"]
            start_period: 20s
            interval: 30s
            timeout: 10s
            retries: 5
        environment:
            PUID: 1000
            PGID: 1000
            TZ: Asia/Jerusalem
            WEBUI_PORT: 8012
            TORRENTING_PORT: 28345
        volumes:
            - /opt/qbittorrent/config:/config
            - /export/storage/torrent_downloads:/data/torrent_downloads
        ports:
            - 8012:8012
            - 28345:28345
            - 28345:28345/udp
        restart: unless-stopped
        labels:
            - com.centurylinklabs.watchtower.enable=true
            - traefik.enable=true
            - traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.internal.mikeage.net`)
            - traefik.http.services.qbittorrent.loadbalancer.server.port=8012
    qbittorrent-keep:
        image: lscr.io/linuxserver/qbittorrent:latest
