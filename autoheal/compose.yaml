---
services:
    autoheal:
        image: willfarrell/autoheal:latest@sha256:70b31c72b7c2e468f30c9c54c60e1bcbebe4cebf028e70875f5bfae34455fef7
        network_mode: none
        environment:
            - AUTOHEAL_CONTAINER_LABEL=all
        restart: unless-stopped
        volumes:
            - /etc/localtime:/etc/localtime:ro
            - /var/run/docker.sock:/var/run/docker.sock
