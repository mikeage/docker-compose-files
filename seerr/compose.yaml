---
services:
    seerr:
        image: ghcr.io/seerr-team/seerr:latest@sha256:d535391db3b5a22ce02241e6d7a50ca714e75d927e46aa20456b77fa051cbf52
        init: true
        environment:
            - LOG_LEVEL=debug
            - TZ=Asia/Jerusalem
        ports:
            - 5055:5055
        volumes:
            - /opt/seerr/config:/app/config
        healthcheck:
            test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
            start_period: 20s
            timeout: 3s
            interval: 15s
            retries: 3
        restart: unless-stopped
        labels:
            - traefik.enable=true
            - traefik.http.routers.seerr.rule=Host(`seerr.internal.mikeage.net`)

