---
services:
    autoheal:
        image: willfarrell/autoheal:latest@sha256:2ea7f0a97b23ae07fbd4410236e75167aaa5c53a6a00b37cb593a74f202c6479
        network_mode: none
        environment:
            - AUTOHEAL_CONTAINER_LABEL=all
        restart: unless-stopped
        volumes:
            - /etc/localtime:/etc/localtime:ro
            - /var/run/docker.sock:/var/run/docker.sock
