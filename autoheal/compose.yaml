---
services:
    autoheal:
        image: willfarrell/autoheal:latest@sha256:9365574e49d9d2a1cacb612fd8873cca3e94f0b9dd2fa0f0d3be03e0078edca8
        network_mode: none
        environment:
            - AUTOHEAL_CONTAINER_LABEL=all
        restart: unless-stopped
        volumes:
            - /etc/localtime:/etc/localtime:ro
            - /var/run/docker.sock:/var/run/docker.sock
