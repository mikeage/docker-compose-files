---
services:
    psitransfer:
        image: psitrax/psitransfer:latest@sha256:71d7e48315566637219c54ec00cac25448b959dc7b9d56a434587adaa5552d77
        user: 1000:1000
        healthcheck:
            test: [CMD, node, -e, 'require("http").get("http://127.0.0.1:3000", (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on("error", () => process.exit(1));']
            start_period: 20s
            interval: 30s
            timeout: 10s
            retries: 5
        ports:
            - 3003:3000
        restart: unless-stopped
        volumes:
            - psitransfer_data:/data
        environment:
            - PSITRANSFER_ADMIN_PASS=${ADMIN_PASSWORD}
            - PSITRANSFER_UPLOAD_PASS=${UPLOAD_PASSWORD}
            - TZ=Asia/Jerusalem
volumes:
    psitransfer_data:
        driver: local
        driver_opts:
            type: nfs
            o: addr=openmediavault.lan,nfsvers=4.2,soft,timeo=600,retrans=2,rsize=1048576,wsize=1048576
            device: :/storage/temporary/psitransfer_data
