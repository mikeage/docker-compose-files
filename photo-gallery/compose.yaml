---
services:
    photo-gallery:
        image: rigon/photo-gallery
        restart: unless-stopped
        healthcheck:
            test: [CMD, wget, --no-verbose, --tries=1, --spider, http://127.0.0.1:3080/]
            start_period: 20s
            interval: 30s
            timeout: 5s
            retries: 5
        volumes:
            - photo-gallery_data:/thumbs
            - downloads:/videos
            - photo-gallery_photos_dummy:/photos
        ports:
            - 3080:3080
        command:
            - -cname=Videos,path=/videos,thumbs=/thumbs
volumes:
    photo-gallery_data:
    photo-gallery_photos_dummy:
    downloads:
        driver: local
        driver_opts:
            type: nfs
            o: addr=openmediavault.lan,nfsvers=4.2,soft,timeo=600,retrans=2,rsize=1048576,wsize=1048576
            device: :/storage/temporary/r/downloads
