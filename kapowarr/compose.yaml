---
services:
    kapowarr:
        image: mrcas/kapowarr:latest
        healthcheck:
            test: [CMD-SHELL, "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/5656; printf \"GET / HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\\
                      n\" >&3; grep -Eq \"HTTP/1\\\\.[01] (200|301|302)\" <&3'"]
            start_period: 20s
            interval: 30s
            timeout: 10s
            retries: 5
        environment:
            PUID: 1000
            PGID: 1000
            TZ: Asia/Jerusalem
        volumes:
            - /opt/kapowarr/db:/app/db
            - storage:/data
        ports:
            - 5656:5656
        restart: unless-stopped
        labels:
            - com.centurylinklabs.watchtower.enable=true
            - traefik.enable=true
            - traefik.http.routers.kapowarr.rule=Host(`kapowarr.internal.mikeage.net`)
volumes:
    storage:
        driver: local
        driver_opts:
            type: nfs
            o: addr=openmediavault.lan,nfsvers=4.2,soft,timeo=600,retrans=2,rsize=1048576,wsize=1048576
            device: :/storage/permanent/comics/
