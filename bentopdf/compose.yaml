---
services:
    bentopdf:
        image: ghcr.io/alam00000/bentopdf-simple:latest # Recommended
        healthcheck:
            test: [CMD, wget, --no-verbose, --tries=1, --spider, http://127.0.0.1:8080/]
            start_period: 20s
            interval: 30s
            timeout: 5s
            retries: 5
        ports:
            - 3007:8080
        restart: unless-stopped
        labels:
            - com.centurylinklabs.watchtower.enable=true
            - traefik.enable=true
            - traefik.http.routers.bentopdf.rule=Host(`bentopdf.internal.mikeage.net`)
