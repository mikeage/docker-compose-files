---
services:
    bentopdf:
        image: ghcr.io/alam00000/bentopdf-simple:2.8.3@sha256:be4953890f441b92f008fe4caf2136dbd5c27d5424f8b2b81329a4345576e69d # Recommended
        healthcheck:
            test: [CMD, wget, --no-verbose, --tries=1, --spider, http://127.0.0.1:8080/]
            start_period: 20s
            interval: 30s
            timeout: 5s
            retries: 5
        ports:
            - 3007:8080
        restart: unless-stopped
        labels:
            - traefik.enable=true
            - traefik.http.routers.bentopdf.rule=Host(`bentopdf.internal.mikeage.net`)
