---
services:
    autoheal:
        image: willfarrell/autoheal:latest@sha256:c3a86c91308d9fedfe0f3ad977d091715dae757abf77264f60a63a0f7857094c
        network_mode: none
        environment:
            - AUTOHEAL_CONTAINER_LABEL=all
        restart: unless-stopped
        volumes:
            - /etc/localtime:/etc/localtime:ro
            - /var/run/docker.sock:/var/run/docker.sock
