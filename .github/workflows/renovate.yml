---
name: Renovate

concurrency:
    group: ${{ github.workflow }}
    cancel-in-progress: false

on:
    push:
        branches:
            - main
    issue_comment:
        types:
            - created
    issues:
        types:
            - edited
    pull_request:
        types:
            - edited
            - closed
    workflow_dispatch:
    schedule:
        - cron: 2/15 * * * *

permissions:
    contents: read

jobs:
    renovate:
        if: >-
            github.event_name == 'workflow_dispatch' ||
            github.event_name == 'schedule' ||
            github.event_name == 'push' ||
            (
                github.event_name == 'issue_comment' &&
                github.event.action == 'created' &&
                contains(github.event.comment.body, '@renovate')
            ) ||
            (
                github.event_name == 'issues' &&
                github.event.action == 'edited' &&
                github.event.issue.title == 'Dependency Dashboard'
            ) ||
            (
                github.event_name == 'pull_request' &&
                (
                    github.event.action == 'edited' ||
                    github.event.action == 'closed'
                ) &&
                startsWith(github.event.pull_request.head.ref, 'renovate/')
            )
        runs-on: ubuntu-latest
        env:
            LOG_LEVEL: info
            RENOVATE_REPOSITORIES: ${{ github.repository }}

        steps:
            - name: Check out repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Run Renovate
              uses: renovatebot/github-action@83ec54fee49ab67d9cd201084c1ff325b4b462e4 # v46.1.10
              with:
                  configurationFile: .github/renovate-bot.json
                  token: ${{ secrets.RENOVATE_TOKEN }}
