---
services:
    qui:
        image: ghcr.io/autobrr/qui:latest
        restart: unless-stopped
        ports:
            - 7476:7476
        volumes:
            - /opt/qui/config:/config
        labels:
            - traefik.enable=true
            - traefik.http.routers.qui.rule=Host(`qui.internal.mikeage.net`)
