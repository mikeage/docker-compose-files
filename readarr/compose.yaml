---
services:
    ebooks:
        image: lscr.io/linuxserver/readarr:develop
        healthcheck:
            test: [CMD-SHELL, "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8787; printf \"GET / HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\\
                      n\" >&3; grep -Eq \"HTTP/1\\\\.[01] (200|301|302)\" <&3'"]
            start_period: 20s
            interval: 30s
            timeout: 10s
            retries: 5
        environment:
            PUID: 1000
            PGID: 1000
            TZ: Asia/Jerusalem
        volumes:
            - /opt/readarr/config:/config
            - storage:/data
        ports:
            - 8787:8787
        restart: unless-stopped
        labels:
            - traefik.enable=true
            - traefik.http.routers.readarr.rule=Host(`readarr.internal.mikeage.net`)
    audiobooks:
        image: lscr.io/linuxserver/readarr:develop
        healthcheck:
            test: [CMD-SHELL, "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8787; printf \"GET / HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\\
                      n\" >&3; grep -Eq \"HTTP/1\\\\.[01] (200|301|302)\" <&3'"]
            start_period: 20s
            interval: 30s
            timeout: 10s
            retries: 5
        environment:
            PUID: 1000
            PGID: 1000
            TZ: Asia/Jerusalem
        volumes:
            - /opt/readarr.audiobooks/config:/config
            - storage:/data
        ports:
            - 8788:8787
        restart: unless-stopped
        labels:
            - traefik.enable=true
            - traefik.http.routers.readarraudiobooks.rule=Host(`readarraudiobooks.internal.mikeage.net`)
volumes:
    storage:
        driver: local
        driver_opts:
            type: nfs
            o: addr=openmediavault.lan,nfsvers=4.2,soft,timeo=600,retrans=2,rsize=1048576,wsize=1048576
            device: :/storage
