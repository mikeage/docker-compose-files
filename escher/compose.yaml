---
services:
    gallery:
        build: .
        healthcheck:
            test: [CMD, wget, --no-verbose, --tries=1, --spider, http://127.0.0.1:8080/]
            start_period: 20s
            interval: 30s
            timeout: 5s
            retries: 5
        ports:
            - 8432:8080
        volumes:
            - images:/app/images:ro
            - /opt/escher/data:/app/data
        environment:
            - IMAGES_DIR=/app/images
            - DATA_DIR=/app/data
            - PORT=8080
            - THUMB_MAX=320
        restart: unless-stopped
        labels:
            - traefik.enable=true
            - traefik.http.routers.escher.rule=Host(`escher.internal.mikeage.net`)
volumes:
    images:
        driver: local
        driver_opts:
            type: nfs
            o: addr=openmediavault.lan,nfsvers=4.2,soft,timeo=600,retrans=2,rsize=1048576,wsize=1048576
            device: :/storage/permanent/Escher/
