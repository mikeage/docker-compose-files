---
# =============================================================================
# PatchMon Docker Compose - Production
# =============================================================================
# To set up your environment, run the setup script:
#
#   bash -c "$(curl -fsSL https://raw.githubusercontent.com/PatchMon/PatchMon/refs/heads/main/docker/setup-env.sh)"
#
# This will download env.example, generate secrets, and create your .env file.
# Alternatively, copy env.example to .env and fill in the values manually.
#
# Then start PatchMon:
#
#   docker compose up -d
#
# See the PatchMon documentation for full configuration details.
# =============================================================================

name: patchmon

services:

    server:
        image: ghcr.io/patchmon/patchmon-server:latest
        restart: unless-stopped
        env_file: .env
        ports:
            - 3007:3000
        depends_on:
            database:
                condition: service_healthy
            redis:
                condition: service_healthy
            guacd:
                condition: service_healthy
    # logging:
    #   driver: "json-file"
    #   options:
    #     max-size: "10m"
    #     max-file: "3"
        labels:
            - traefik.enable=true
            - traefik.http.routers.patchmon.rule=Host(`patchmon.internal.mikeage.net`)

    database:
        image: postgres:17-alpine@sha256:c7526c0f6c3f30260a563d7bcf8ad778effac59a44f8ffa86678c35418338609 # https://github.com/PatchMon/PatchMon/blob/main/docker/docker-compose.yml
        restart: unless-stopped
        env_file: .env
        volumes:
            - postgres_data:/var/lib/postgresql/data
    # networks:
    #   - patchmon-internal
        healthcheck:
            test: [CMD-SHELL, 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
            interval: 3s
            timeout: 5s
            retries: 7
        # logging:
        #     driver: json-file
        #     options:
        #         max-size: 10m
        #         max-file: '3'

    redis:
        image: redis:7-alpine@sha256:7aec734b2bb298a1d769fd8729f13b8514a41bf90fcdd1f38ec52267fbaa8ee6  # https://github.com/PatchMon/PatchMon/blob/main/docker/docker-compose.yml
        restart: unless-stopped
        env_file: .env
        command: redis-server --requirepass ${REDIS_PASSWORD}
        volumes:
            - redis_data:/data
    # networks:
    #   - patchmon-internal
        healthcheck:
            test: [CMD, redis-cli, --no-auth-warning, -a, '${REDIS_PASSWORD}', ping]
            interval: 3s
            timeout: 5s
            retries: 7
    # logging:
    #   driver: "json-file"
    #   options:
    #     max-size: "10m"
    #     max-file: "3"

    guacd:
        image: guacamole/guacd:latest
        restart: unless-stopped
        read_only: true
        tmpfs:
            - /tmp:size=64m
        security_opt:
            - no-new-privileges:true
        cap_drop:
            - ALL
        mem_limit: 512m
        cpus: '1.0'
    # networks:
    #   - patchmon-internal
        healthcheck:
            test: [CMD-SHELL, nc -z localhost 4822 || exit 1]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 10s
        logging:
            driver: json-file
            options:
                max-size: 10m
                max-file: '3'

volumes:
    postgres_data:
    redis_data:

