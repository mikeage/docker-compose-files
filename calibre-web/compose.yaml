---
services:
    calibre-web:
        image: lscr.io/linuxserver/calibre-web:5.33.2@sha256:60f5cf63215a8511a906371ab34bff4c339d5f87c194324cb7d561845d2baae1
        healthcheck:
            test: [CMD-SHELL, "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8083; printf \"GET / HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\\
                      n\" >&3; grep -Eq \"HTTP/1\\\\.[01] (200|301|302)\" <&3'"]
            start_period: 300s
            interval: 30s
            timeout: 10s
            retries: 5
        environment:
            - TZ=Asia/Jerusalem
            - DOCKER_MODS=linuxserver/mods:universal-calibre
            - PUID=1000
            - PGID=1000
        volumes:
            - /opt/calibre-web/config:/config
            - ebooks:/books
        ports:
            - 8084:8083
        restart: unless-stopped
    calibre:
        image: lscr.io/linuxserver/calibre:9.7.0@sha256:95e22e9a3c85bc77f276a04c0b8fc3e94faffba634288f70011d4906f70a739a
        healthcheck:
            test: [CMD-SHELL, "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8080; printf \"GET / HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\\
                      n\" >&3; grep -Eq \"HTTP/1\\\\.[01] (200|301|302)\" <&3'"]
            start_period: 60s
            interval: 30s
            timeout: 10s
            retries: 5
        environment:
            - TZ=Asia/Jerusalem
            - PUID=1000
            - PGID=1000
            # - PASSWORD=${PASSWORD}
        volumes:
            - ebooks:/config
        ports:
            - 8080:8080
            - 8081:8081
        restart: unless-stopped
        labels:
            - traefik.enable=true
            - traefik.http.routers.calibre.rule=Host(`calibre.internal.mikeage.net`)
            - traefik.http.services.calibre.loadbalancer.server.port=8080
volumes:
    ebooks:
        driver: local
        driver_opts:
            type: nfs
            o: addr=openmediavault.lan,nfsvers=4.2,soft,timeo=600,retrans=2,rsize=1048576,wsize=1048576
            device: :/storage/media/ebooks
