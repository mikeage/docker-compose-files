---
services:
    traefik-kop:
        image: ghcr.io/jittering/traefik-kop:latest
        restart: unless-stopped
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
        environment:
            - REDIS_ADDR=redis.lan:6379
            - BIND_IP=${HOSTNAME}
            - REDIS_PASS=${REDIS_PASS}
            - TZ=Asia/Jerusalem
