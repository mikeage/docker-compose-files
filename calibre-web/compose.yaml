---
services:
    calibre-web:
        image: lscr.io/linuxserver/calibre-web:latest@sha256:623a616cbbdf91094ebb6597ef438af56870ef547890282f7112075aff179f59
        healthcheck:
            test: [CMD-SHELL, "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8083; printf \"GET / HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\\
                      n\" >&3; grep -Eq \"HTTP/1\\\\.[01] (200|301|302)\" <&3'"]
            start_period: 20s
            interval: 30s
            timeout: 10s
            retries: 5
        environment:
            - TZ=Asia/Jerusalem
            - DOCKER_MODS=linuxserver/mods:universal-calibre
            - PUID=1000
            - PGID=1000
        volumes:
            - /opt/calibre-web/config:/config
            - ebooks:/books
        ports:
            - 8084:8083
        restart: unless-stopped
    calibre:
        image: lscr.io/linuxserver/calibre:latest@sha256:0b93327231a4ef4d23d5d6702c3df719be08fc31ad0bb49d37f0b75b22d32851
        healthcheck:
            test: [CMD-SHELL, "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8080; printf \"GET / HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\\
                      n\" >&3; grep -Eq \"HTTP/1\\\\.[01] (200|301|302)\" <&3'"]
            start_period: 20s
            interval: 30s
            timeout: 10s
            retries: 5
        environment:
            - TZ=Asia/Jerusalem
            - PUID=1000
            - PGID=1000
            # - PASSWORD=${PASSWORD}
        volumes:
            - ebooks:/config
        ports:
            - 8080:8080
            - 8081:8081
        restart: unless-stopped
        labels:
            - traefik.enable=true
            - traefik.http.routers.calibre.rule=Host(`calibre.internal.mikeage.net`)
            - traefik.http.services.calibre.loadbalancer.server.port=8080
volumes:
    ebooks:
        driver: local
        driver_opts:
            type: nfs
            o: addr=openmediavault.lan,nfsvers=4.2,soft,timeo=600,retrans=2,rsize=1048576,wsize=1048576
            device: :/storage/media/ebooks
