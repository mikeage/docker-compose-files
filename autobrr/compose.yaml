---
services:
    autobrr:
        image: ghcr.io/autobrr/autobrr:v1.76.0@sha256:f0f4d73fcd77700b1c98233562cd94a78b9bf685a7594a0aac4f8a9436b5044d
        restart: unless-stopped
        healthcheck:
            test: [CMD, curl, -fsS, http://127.0.0.1:7474/]
            start_period: 20s
            interval: 30s
            timeout: 5s
            retries: 5
        user: 1000:1000
        environment:
            - TZ=Asia/Jerusalem
        volumes:
            - /opt/autobrr/config:/config
        ports:
            - 7474:7474
        labels:
            - traefik.enable=true
            - traefik.http.routers.autobrr.rule=Host(`autobrr.internal.mikeage.net`)
