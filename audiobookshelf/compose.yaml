---
services:
    audiobookshelf:
        image: ghcr.io/advplyr/audiobookshelf:2.33.1@sha256:a4a5841bba093d81e5f4ad1eaedb4da3fda6dbb2528c552349da50ad1f7ae708
        restart: unless-stopped
        healthcheck:
            test: [CMD, wget, --no-verbose, --tries=1, --spider, http://127.0.0.1/healthcheck]
            start_period: 20s
            interval: 30s
            timeout: 5s
            retries: 5
        environment:
            AUDIOBOOKSHELF_UID: 1000
            AUDIOBOOKSHELF_GID: 1000
            TZ: Asia/Jerusalem
        ports:
            - 13378:80
        volumes:
            - audiobooks:/audiobooks:ro
            - kidsaudiobooks:/KidsAudiobooks:ro
            - shiurim:/shiurim:ro
            - /opt/audiobookshelf/config:/config
            - /opt/audiobookshelf/metadata:/metadata
        labels:
            - traefik.enable=true
            - traefik.http.routers.audiobookshelf.rule=Host(`audiobookshelf.internal.mikeage.net`)
volumes:
    audiobooks:
        driver: local
        driver_opts:
            type: nfs
            o: addr=openmediavault.lan,nfsvers=4.2,soft,timeo=600,retrans=2,rsize=1048576,wsize=1048576
            device: :/storage/media/audiobooks
    kidsaudiobooks:
        driver: local
        driver_opts:
            type: nfs
            o: addr=openmediavault.lan,nfsvers=4.2,soft,timeo=600,retrans=2,rsize=1048576,wsize=1048576
            device: :/storage/media/KidsAudiobooks
    shiurim:
        driver: local
        driver_opts:
            type: nfs
            o: addr=openmediavault.lan,nfsvers=4.2,soft,timeo=600,retrans=2,rsize=1048576,wsize=1048576
            device: :/storage/media/shiurim
