---
services:
    redis:
        image: docker.io/valkey/valkey:8-alpine
        command: valkey-server --save 30 1 --loglevel warning
        restart: unless-stopped
        healthcheck:
            test: [CMD, valkey-cli, ping]
            start_period: 5s
            interval: 10s
            timeout: 5s
            retries: 5
        volumes:
            - valkey-data:/data
    searxng:
        image: docker.io/searxng/searxng:latest
        restart: unless-stopped
        ports:
            - 8523:8080
        volumes:
            - /opt/searxng/config:/etc/searxng
            - searxng-data:/var/cache/searxng
        environment:
            - SEARXNG_BASE_URL=https://searxng.internal.mikeage.net/
        labels:
            - com.centurylinklabs.watchtower.enable=true
            - traefik.enable=true
            - traefik.http.routers.searxng.rule=Host(`searxng.internal.mikeage.net`)

volumes:
    valkey-data:
    searxng-data:
