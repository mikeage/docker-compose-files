---
services:
    navidrome:
        image: deluan/navidrome:latest@sha256:9fa40b3d8dec43ceb2213d1fa551da3dcfef6ac6d19c2e534efb92527c2bafd2
        restart: unless-stopped
        healthcheck:
            test: [CMD, wget, --no-verbose, --tries=1, --spider, http://127.0.0.1:4533/]
            start_period: 20s
            interval: 30s
            timeout: 5s
            retries: 5
        ports:
            - 4533:4533
        environment:
      # Optional: put your config options customization here. Examples:
            ND_SCANSCHEDULE: 1h
            ND_LOGLEVEL: info
            ND_BASEURL: ''
            TZ: Asia/Jerusalem
        volumes:
            - /opt/navidrome/data:/data
            - music:/music:ro
        labels:
            - traefik.enable=true
            - traefik.http.routers.navidrome.rule=Host(`navidrome.internal.mikeage.net`)
volumes:
    music:
        driver: local
        driver_opts:
            type: nfs
            o: addr=openmediavault.lan,nfsvers=4.2,soft,timeo=600,retrans=2,rsize=1048576,wsize=1048576
            device: :/storage/media/Music
