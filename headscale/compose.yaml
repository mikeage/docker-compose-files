---
services:
    headscale:
        image: docker.io/headscale/headscale:v0.26@sha256:ea9b5ee06274d757a4d52103de56cd11a9c393acb19d9a35f4b9fe52ada410de
        restart: unless-stopped
        environment:
            - TZ=Asia/Jerusalem
        ports:
            - 5443:8080
            # - "127.0.0.1:9090:9090"
        volumes:
            - /opt/headscale/config:/etc/headscale
            - /opt/headscale/lib:/var/lib/headscale
            - /opt/headscale/run:/var/run/headscale
        command: serve
        labels:
            me.tale.headplane.target: headscale
    headplane:
        depends_on:
            - headscale
        image: ghcr.io/tale/headplane:0.6.0@sha256:b56ea59fd9424470bdb335f0be5524915fc4c34cc826ce25e583f440e4e56864
        restart: unless-stopped
        environment:
            - TZ=Asia/Jerusalem
        ports:
            - 3005:3005
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - /opt/headscale/headplane-config/config.yaml:/etc/headplane/config.yaml
            - /opt/headscale/config/config.yaml:/etc/headscale/config.yaml
            # If using dns.extra_records in Headscale (recommended), this should
            # match the headscale.dns_records_path in your config.yaml
            # - /opt/headscale/config/dns_records.json:/etc/headscale/dns_records.json
            - /opt/headscale/headplane-data:/var/lib/headplane
        labels:
            - traefik.enable=true
            - traefik.http.routers.headplane.rule=Host(`headplane.internal.mikeage.net`)
