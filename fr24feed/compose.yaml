---
services:
    fr24feed:
        image: ghcr.io/sdr-enthusiasts/docker-flightradar24:latest@sha256:ddd1ca0b59642a91d82a1f736ccdaaa5e5f3ffd5164160604667e7e256e30b24
        restart: unless-stopped
        ports:
            - 8754:8754
        environment:
            TZ: Asia/Jerusalem
            BEASTHOST: ff-2027.lan
            MLAT: no
            FR24KEY: ${KEY}
        tmpfs:
            - /var/log
        labels:
            - traefik.enable=true
            - traefik.http.routers.fr24feed.rule=Host(`fr24feed.internal.mikeage.net`)
