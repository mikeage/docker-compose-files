---
services:
    autoheal:
        image: willfarrell/autoheal:latest@sha256:a292c350021dac887baacb7a247efa1fc9818bfb6d882af966e7310d53859628
        network_mode: none
        environment:
            - AUTOHEAL_CONTAINER_LABEL=all
        restart: unless-stopped
        volumes:
            - /etc/localtime:/etc/localtime:ro
            - /var/run/docker.sock:/var/run/docker.sock
