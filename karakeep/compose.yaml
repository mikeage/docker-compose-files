---
services:
    web:
        image: ghcr.io/karakeep-app/karakeep:release@sha256:20754dbdafb11dfe288bbb1c2342a7855081b08ea069e86fcf2d4a2d945d3653
        restart: unless-stopped
        volumes:
            - /opt/karakeep/data:/data
        ports:
            - 3008:3000
        env_file:
            - .env
        environment:
            MEILI_ADDR: http://meilisearch:7700
            BROWSER_WEB_URL: http://chrome:9222
      # OPENAI_API_KEY: ...
            DATA_DIR: /data
            TZ: Asia/Jerusalem
        labels:
            - traefik.enable=true
            - traefik.http.routers.karakeep.rule=Host(`karakeep.internal.mikeage.net`)
    chrome:
        image: gcr.io/zenika-hub/alpine-chrome:124@sha256:1a0046448e0bb6c275c88f86e01faf0de62b02ec8572901256ada0a8c08be23f
        restart: unless-stopped
        healthcheck:
            test: [CMD, wget, --no-verbose, --tries=1, --spider, http://127.0.0.1:9222/json/version]
            start_period: 10s
            interval: 30s
            timeout: 5s
            retries: 5
        environment:
            - TZ=Asia/Jerusalem
        command:
            - --no-sandbox
            - --disable-gpu
            - --disable-dev-shm-usage
            - --remote-debugging-address=0.0.0.0
            - --remote-debugging-port=9222
            - --hide-scrollbars
    meilisearch:
        image: getmeili/meilisearch:v1.11.1@sha256:2ab0c8bdf58b7305e48af7372c47d5638d51dc1bb3a59c8e2b07eca6fe7176e9
        restart: unless-stopped
        healthcheck:
            test: [CMD, wget, --no-verbose, --tries=1, --spider, http://127.0.0.1:7700/health]
            start_period: 10s
            interval: 30s
            timeout: 5s
            retries: 5
        env_file:
            - .env
        environment:
            MEILI_NO_ANALYTICS: 'true'
            TZ: Asia/Jerusalem
        volumes:
            - /opt/karakeep/mellisearch:/meili_data
