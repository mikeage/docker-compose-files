---
name: CI

on:
    pull_request:
    push:
        branches:
            - main
    merge_group:

permissions:
    contents: read

jobs:
    validate:
        runs-on: ubuntu-latest

        steps:
            - name: Check out repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  fetch-depth: 0

            - name: Set up uv
              uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
              with:
                  enable-cache: true

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

            - name: Run prek
              run: uvx prek run --all-files

            - name: Validate compose files
              run: uv run scripts/validate_compose.py

            - name: Build custom Dockerfiles
              env:
                  EVENT_NAME: ${{ github.event_name }}
                  PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
                  PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
              run: |
                  set -euo pipefail

                  mapfile -t dockerfiles < <(find . \( -name Dockerfile -o -name 'Dockerfile.*' \) | sort)
                  build_targets=()

                  if [[ "$EVENT_NAME" == "pull_request" ]]; then
                    mapfile -t changed_files < <(git diff --name-only "$PR_BASE_SHA" "$PR_HEAD_SHA")

                    for dockerfile in "${dockerfiles[@]}"; do
                      context_dir="$(dirname "$dockerfile")"
                      context_path="${context_dir#./}"

                      for changed_file in "${changed_files[@]}"; do
                        if [[ "$changed_file" == "$context_path" || "$changed_file" == "$context_path/"* ]]; then
                          build_targets+=("$dockerfile")
                          break
                        fi
                      done
                    done
                  else
                    build_targets=("${dockerfiles[@]}")
                  fi

                  if [[ ${#build_targets[@]} -eq 0 ]]; then
                    echo "No Dockerfile contexts changed in this pull request."
                    exit 0
                  fi

                  for dockerfile in "${build_targets[@]}"; do
                    context_dir="$(dirname "$dockerfile")"
                    tag_name="ci-$(echo "$context_dir" | tr '/.' '-')"

                    echo "::group::docker build $dockerfile"
                    docker buildx build --load --file "$dockerfile" --tag "$tag_name" "$context_dir"
                    echo "::endgroup::"
                  done
