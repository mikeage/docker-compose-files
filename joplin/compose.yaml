---
services:
    db:
        image: postgres:16@sha256:760ea41aae126965bedd587d35a23de37447bb13a6ac4444bef6ff73b8b72234
        healthcheck:
            test: [CMD-SHELL, 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
            start_period: 10s
            interval: 10s
            timeout: 5s
            retries: 6
        volumes:
            - /opt/joplin/postgres_data:/var/lib/postgresql/data
        # ports:
        #     - 5432:5432
        restart: unless-stopped
        environment:
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_DB=${POSTGRES_DATABASE}
            - TZ=Asia/Jerusalem
    app:
        image: joplin/server:3.6.1@sha256:95c1badac330e53918ff3a756fccc67d1d7f65d00a4f806c6a5f79925e7f18ca
        healthcheck:
            test: [CMD, node, -e, 'require("http").get("http://127.0.0.1:22300", (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on("error", () => process.exit(1));']
            start_period: 20s
            interval: 30s
            timeout: 10s
            retries: 5
        depends_on:
            db:
                condition: service_healthy
        ports:
            - 22300:22300
        restart: unless-stopped
        volumes:
            - /opt/joplin/data:/mnt/data
        environment:
            APP_PORT: 22300
            APP_BASE_URL: https://joplin.internal.mikeage.net
            DB_CLIENT: pg
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DATABASE: ${POSTGRES_DATABASE}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PORT: ${POSTGRES_PORT}
            POSTGRES_HOST: db
            STORAGE_DRIVER: Type=Filesystem; Path=/mnt/data
            MAILER_ENABLED: 1
            MAILER_HOST: ${SMTP_HOST}
            MAILER_PORT: ${SMTP_PORT}
            MAILER_SECURITY: 1
            MAILER_AUTH_USER: ${SMTP_USERNAME}
            MAILER_AUTH_PASSWORD: ${SMTP_PASSWORD}
            MAILER_NOREPLY_NAME: joplinserver
            MAILER_NOREPLY_EMAIL: no-reply-joplin@mikeage.net
            TZ: Asia/Jerusalem
        labels:
            - traefik.enable=true
            - traefik.http.routers.joplin.rule=Host(`joplin.internal.mikeage.net`)
