---
services:
    mosquitto:
        image: eclipse-mosquitto:latest
        restart: unless-stopped
        environment:
            - TZ=Asia/Jerusalem
        volumes:
            - /opt/mosquitto/config:/mosquitto/config
        ports:
            - 1883:1883
            - 9001:9001
        healthcheck:
            test: mosquitto_sub -E -t '#'
            interval: 60s
            timeout: 5s
            retries: 2
