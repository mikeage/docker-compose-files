---
services:
    homeassistant:
        image: ghcr.io/home-assistant/home-assistant:stable
        healthcheck:
            test: [CMD, python3, -c, 'import urllib.request; urllib.request.urlopen("http://127.0.0.1:8123/", timeout=5)']
            start_period: 40s
            interval: 30s
            timeout: 10s
            retries: 5
        environment:
            - TZ=Asia/Jerusalem
        volumes:
            - /opt/homeassistant/config:/config
            - /etc/localtime:/etc/localtime:ro
        restart: unless-stopped
        privileged: true
        network_mode: host
        depends_on:
            mariadb:
                condition: service_healthy
    mariadb:
        image: mariadb:12
        healthcheck:
            test: [CMD-SHELL, mariadb-admin ping -h 127.0.0.1 -u"$$MYSQL_USER" -p"$$MYSQL_PASSWORD" --silent]
            start_period: 20s
            interval: 10s
            timeout: 5s
            retries: 6
        ports:
            - 127.0.0.1:3306:3306
        volumes:
            - /opt/homeassistant/db:/var/lib/mysql
        environment:
            - MYSQL_ROOT_PASSWORD=${ROOT_PASSWORD}
            - MYSQL_USER=${DB_USER}
            - MYSQL_PASSWORD=${DB_PASSWORD}
            - MYSQL_DATABASE=${DB_NAME}
            - TZ=Asia/Jerusalem
        restart: unless-stopped
