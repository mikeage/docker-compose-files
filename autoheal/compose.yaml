---
services:
    autoheal:
        image: willfarrell/autoheal:latest@sha256:69b099649a5cf66ca03579a35cbc5f5276236e0a196496d6a43926b8e53519c7
        network_mode: none
        environment:
            - AUTOHEAL_CONTAINER_LABEL=all
        restart: unless-stopped
        volumes:
            - /etc/localtime:/etc/localtime:ro
            - /var/run/docker.sock:/var/run/docker.sock
