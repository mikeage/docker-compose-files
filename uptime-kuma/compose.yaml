---
services:
    uptime-kuma:
        environment:
            - TZ=Asia/Jerusalem
        image: louislam/uptime-kuma:latest@sha256:3d632903e6af34139a37f18055c4f1bfd9b7205ae1138f1e5e8940ddc1d176f9
        ports:
            - 3001:3001
        volumes:
            - /opt/uptime-kuma/data:/app/data
        restart: unless-stopped
        labels:
            - traefik.enable=true
            - traefik.http.routers.uptimekuma.rule=Host(`uptimekuma.internal.mikeage.net`)
