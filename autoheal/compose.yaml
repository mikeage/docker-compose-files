---
services:
    autoheal:
        image: willfarrell/autoheal:latest
        network_mode: none
        environment:
            - AUTOHEAL_CONTAINER_LABEL=all
        restart: unless-stopped
        volumes:
            - /etc/localtime:/etc/localtime:ro
            - /var/run/docker.sock:/var/run/docker.sock
        labels:
            - com.centurylinklabs.watchtower.enable=true
