---
services:
    rsyslog-dockerlogs:
        image: rsyslog/rsyslog-dockerlogs:latest@sha256:3639fbff294be6be6da82ff6f3830165ba527cce278fa89b31b821d12ce7318e
        restart: unless-stopped
        environment:
            REMOTE_SERVER_NAME: logcollector.lan # your collector
            REMOTE_SERVER_PORT: '514'
            RSYSLOG_HOSTNAME: ${HOSTNAME}    # or hardcode
      # Optional: include stderr too (enabled by default); add filters via labels later
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
